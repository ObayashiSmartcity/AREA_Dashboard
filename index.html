<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エリア比較ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f4f8;--surface:#ffffff;--card:#ffffff;--border:#e2e8f0;
  --accent:#1a73e8;--accent-light:#e8f0fe;--accent2:#00b8a9;--accent2-light:#e0f7f5;
  --accent3:#ff6d00;--accent3-light:#fff3e0;
  --text:#1a202c;--text2:#4a5568;--muted:#718096;
  --shadow:0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 14px rgba(0,0,0,.06), 0 2px 6px rgba(0,0,0,.04);
  --shadow-lg:0 10px 30px rgba(0,0,0,.08), 0 4px 10px rgba(0,0,0,.04);
  --radius:12px;
}
body{background:var(--bg);color:var(--text);
  font-family:'Noto Sans JP','Segoe UI','Hiragino Kaku Gothic ProN',sans-serif;
  font-weight:400;line-height:1.6;overflow-x:hidden;}
.page{display:none;min-height:100vh;animation:fadeIn .45s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ===== HEADER ===== */
.header{
  background:linear-gradient(135deg,#1a73e8 0%,#4f8cff 50%,#00b8a9 100%);
  padding:20px 40px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(26,115,232,.18);
}
.header h1{font-size:1.4rem;font-weight:700;color:#fff;display:inline-block;}
.header .subtitle{color:rgba(255,255,255,.85);font-size:.82rem;margin-top:2px;font-weight:300;}
.header .step-badge{display:inline-block;background:rgba(255,255,255,.22);color:#fff;
  font-size:.7rem;padding:3px 12px;border-radius:20px;margin-right:10px;vertical-align:middle;
  font-weight:600;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.25);}

/* ===== CONTROLS ===== */
.controls{padding:20px 40px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;
  background:var(--surface);border-bottom:1px solid var(--border);}
.select-wrap{position:relative;}
.select-wrap select{background:var(--bg);color:var(--text);border:1px solid var(--border);
  padding:10px 36px 10px 14px;border-radius:8px;font-size:.88rem;min-width:300px;cursor:pointer;
  appearance:none;-webkit-appearance:none;font-family:inherit;transition:border-color .2s;}
.select-wrap select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
.select-wrap::after{content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;font-size:.8rem;}

/* ===== BUTTONS ===== */
.btn{padding:10px 22px;border:none;border-radius:8px;font-size:.88rem;font-weight:600;
  cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;font-family:inherit;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#1557b0;box-shadow:0 4px 14px rgba(26,115,232,.28);transform:translateY(-1px);}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important;}

/* ===== TABLE ===== */
.table-container{padding:0 40px 30px;overflow-x:auto;}
table{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);
  border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow);}
thead th{background:var(--accent-light);padding:13px 16px;text-align:left;font-size:.75rem;
  text-transform:uppercase;letter-spacing:.6px;color:var(--accent);cursor:pointer;
  user-select:none;white-space:nowrap;font-weight:600;border-bottom:2px solid #d0dff5;}
thead th:hover{background:#dce8fc;color:#1557b0;}
thead th .sort-arrow{margin-left:4px;font-size:.6rem;}
tbody tr{transition:background .15s;}
tbody tr:hover{background:#f7faff;}
tbody td{padding:12px 16px;font-size:.84rem;border-bottom:1px solid var(--border);color:var(--text2);}
tbody td strong{color:var(--text);font-weight:600;}
.check-col{width:40px;text-align:center;}
input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;}

/* ===== BAR IN CELL ===== */
.bar-cell{position:relative;min-width:120px;}
.bar-bg{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.bar-val{font-size:.73rem;color:var(--muted);margin-top:3px;font-weight:500;}

/* ===== TAGS ===== */
.tag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.71rem;font-weight:600;}
.tag-region{background:var(--accent-light);color:var(--accent);}
.tag-type{background:var(--accent2-light);color:#00897b;}

/* ===== PAGE 2 GRID ===== */
.dash-grid{display:grid;grid-template-columns:320px 1fr;grid-template-rows:auto 1fr;
  gap:0;min-height:calc(100vh - 76px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:20px;
  overflow-y:auto;grid-row:1/3;}
.map-area{height:420px;position:relative;border-bottom:1px solid var(--border);}
.charts-area{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px;
  align-content:start;background:var(--bg);}

/* ===== CARDS ===== */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;box-shadow:var(--shadow);}
.card:hover{box-shadow:var(--shadow-md);}
.card-title{font-size:.78rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:600;}
.card-title .dot{width:8px;height:8px;border-radius:50%;}

/* ===== SIDEBAR ===== */
.sidebar h3{font-size:.82rem;color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:12px;font-weight:600;}
.area-chip{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--accent-light);border:1px solid #d0dff5;
  border-radius:10px;margin-bottom:8px;font-size:.84rem;font-weight:500;
  transition:box-shadow .2s;}
.area-chip:hover{box-shadow:var(--shadow);}
.area-chip .color-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;
  box-shadow:0 0 0 2px rgba(255,255,255,.9),0 0 0 3px currentColor;}
.filter-group{margin-top:20px;}
.filter-group label{display:flex;align-items:center;gap:8px;padding:5px 0;
  font-size:.82rem;cursor:pointer;color:var(--text2);transition:color .15s;}
.filter-group label:hover{color:var(--accent);}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#a0aec0;}

/* ===== LOADER ===== */
.loader-overlay{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;
  align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;
  backdrop-filter:blur(8px);}
.loader-overlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:44px;height:44px;border:3px solid #e2e8f0;border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== STATUS BAR ===== */
.status-bar{padding:10px 40px;background:var(--accent-light);
  border-bottom:1px solid #d0dff5;font-size:.82rem;color:var(--accent);
  display:flex;align-items:center;gap:12px;font-weight:500;}
.count-badge{background:var(--accent);color:#fff;padding:2px 12px;border-radius:20px;
  font-size:.73rem;font-weight:700;min-width:24px;text-align:center;}

/* ===== RESPONSIVE ===== */
@media(max-width:1024px){
  .dash-grid{grid-template-columns:1fr;grid-template-rows:auto auto auto;}
  .sidebar{grid-row:auto;border-right:none;border-bottom:1px solid var(--border);}
  .charts-area{grid-template-columns:1fr;}
  .controls,.table-container{padding-left:20px;padding-right:20px;}
  .header{padding:16px 20px;}
}

/* ===== LEAFLET OVERRIDES ===== */
.leaflet-container{background:#f0f4f8!important;}
.custom-popup .leaflet-popup-content-wrapper{background:#fff;color:var(--text);
  border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-lg);
  font-family:'Noto Sans JP',sans-serif;}
.custom-popup .leaflet-popup-tip{background:#fff;}
.area-label{font-size:.72rem;color:var(--text);background:transparent;border:none;
  box-shadow:none;text-shadow:0 1px 3px rgba(255,255,255,.8);font-weight:600;}

/* ===== MISC ===== */
.back-btn{position:absolute;right:40px;top:18px;}
@media(max-width:768px){.back-btn{position:static;margin-top:8px;}}
</style>
</head>
<body>

<!-- Loader -->
<div class="loader-overlay" id="loader"><div class="spinner"></div></div>

<!-- ==================== PAGE 1 ==================== -->
<div class="page active" id="page1">
  <div class="header">
    <div><span class="step-badge">STEP 1</span>
      <h1>エリア類似度分析</h1></div>
    <div class="subtitle">対象エリアを選択し、人口規模・年齢構成・産業構成の類似度から比較エリアを検討します</div>
  </div>
  <div class="controls">
    <div class="select-wrap">
      <select id="targetArea"><option value="">── 対象エリアを選択 ──</option></select>
    </div>
    <button class="btn btn-primary" id="btnAnalyze" disabled onclick="runAnalysis()">
      ▶ 分析実行</button>
    <div style="flex:1"></div>
    <button class="btn btn-primary" id="btnNext" disabled onclick="goToPage2()">
      比較ダッシュボードへ →</button>
  </div>
  <div class="status-bar" id="statusBar" style="display:none;">
    <span>選択中のエリア:</span><span class="count-badge" id="selectedCount">0</span>
    <span id="selectedNames"></span>
  </div>
  <div style="padding-top:20px;">
    <div class="table-container"><div id="resultArea"></div></div>
  </div>
</div>

<!-- ==================== PAGE 2 ==================== -->
<div class="page" id="page2">
  <div class="header" style="position:relative;">
    <div><span class="step-badge">STEP 2</span>
      <h1>エリア指標比較ダッシュボード</h1></div>
    <div class="subtitle">選択エリアの強み・弱みを多角的に比較分析します</div>
    <button class="btn btn-secondary back-btn"
      style="background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.3);"
      onclick="goToPage1()">← エリア選択に戻る</button>
  </div>
  <div class="dash-grid">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <h3>📍 比較エリア</h3>
      <div id="areaChips"></div>
      <div class="filter-group">
        <h3 style="margin-top:24px;">📂 指標フィルタ</h3>
        <div id="indexFilters"></div>
      </div>
    </div>
    <!-- Map -->
    <div class="map-area" id="mapContainer"></div>
    <!-- Charts -->
    <div class="charts-area" id="chartsArea">
      <div class="card" style="grid-column:1/-1;">
        <div class="card-title"><span class="dot" style="background:var(--accent);"></span>
          正規化スコア比較（レーダーチャート）</div>
        <canvas id="radarChart" height="110"></canvas>
      </div>
      <div class="card" style="grid-column:1/-1;">
        <div class="card-title"><span class="dot" style="background:var(--accent2);"></span>
          指標別スコア比較（バーチャート）</div>
        <canvas id="barChart" height="80"></canvas>
      </div>
      <div class="card" style="grid-column:1/-1;">
        <div class="card-title"><span class="dot" style="background:var(--accent3);"></span>
          強み・弱み分析（対象エリア基準の差分）</div>
        <canvas id="diffChart" height="80"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
// ===== GLOBAL STATE =====
let popData=[], martData=[], areaMap={}, areaInfo={}, indexMap={};
let targetId=null, selectedIds=new Set(), sortCol='popDiff', sortAsc=true;
let map=null, radarChart=null, barChart=null, diffChart=null;
const COLORS=['#1a73e8','#00b8a9','#ff6d00','#e53935','#43a047','#d81b60',
  '#5e35b1','#00acc1','#fb8c00','#546e7a','#7cb342','#ab47bc'];
const AGE_KEYS=['人口_10歳未満','人口_10代','人口_20代','人口_30代',
  '人口_40代','人口_50代','人口_60代','人口_70歳以上'];
const AGE_LABELS=['~10歳','10代','20代','30代','40代','50代','60代','70歳~'];
let IND_KEYS=[];

// ===== LOAD DATA =====
async function init(){
  try{
    const [pRes,mRes]=await Promise.all([
      fetch('master_population.json'),
      fetch('mart_index_normalized.json')
    ]);
    popData=await pRes.json();
    martData=await mRes.json();
    martData.forEach(r=>{
      areaMap[r.area_id]=r.area_name;
      if(!areaInfo[r.area_id]) areaInfo[r.area_id]={
        lat:r.latitude, lng:r.longitude,
        pref:r.prefecture, region:r.region, type:r.area_type
      };
    });
    martData.forEach(r=>{indexMap[r.index_code]=r.index_name;});
    if(popData.length>0){
      IND_KEYS=Object.keys(popData[0]).filter(k=>k.startsWith('産業_')).sort();
    }
    const sel=document.getElementById('targetArea');
    const sorted=Object.entries(areaMap).sort((a,b)=>a[0].localeCompare(b[0]));
    sorted.forEach(([id,name])=>{
      const o=document.createElement('option');
      o.value=id;o.textContent=`${name} (${id})`;sel.appendChild(o);
    });
    sel.addEventListener('change',()=>{
      document.getElementById('btnAnalyze').disabled=!sel.value;
    });
  }catch(e){
    console.error(e);
    alert('データの読み込みに失敗しました。JSONファイルが同じディレクトリにあるか確認してください。');
  }
  document.getElementById('loader').classList.add('hidden');
}

// ===== COSINE SIMILARITY =====
function cosine(a,b){
  let dot=0,na=0,nb=0;
  for(let i=0;i<a.length;i++){dot+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i];}
  return(na===0||nb===0)?0:dot/(Math.sqrt(na)*Math.sqrt(nb));
}

// ===== ANALYSIS =====
function runAnalysis(){
  targetId=document.getElementById('targetArea').value;
  if(!targetId)return;
  selectedIds.clear(); updateStatus();
  const tPop=popData.find(r=>r.area_id===targetId);
  if(!tPop){alert('対象エリアの人口データが見つかりません');return;}
  const tTotal=tPop['総人口']||0;
  const tAge=AGE_KEYS.map(k=>tPop[k]||0);
  const tInd=IND_KEYS.map(k=>tPop[k]||0);

  let rows=[];
  popData.forEach(r=>{
    if(r.area_id===targetId)return;
    const name=areaMap[r.area_id]||r.area_id;
    const info=areaInfo[r.area_id]||{};
    const total=r['総人口']||0;
    const popDiff=Math.abs(tTotal-total);
    const age=AGE_KEYS.map(k=>r[k]||0);
    const ind=IND_KEYS.map(k=>r[k]||0);
    const ageSim=cosine(tAge,age);
    const indSim=cosine(tInd,ind);
    rows.push({id:r.area_id,name,popDiff,ageSim,indSim,total,
      region:info.region||'',type:info.type||'',age,ind});
  });

  rows.sort((a,b)=>{
    let va=a[sortCol],vb=b[sortCol];
    if(sortCol==='name')return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
    return sortAsc?va-vb:vb-va;
  });

  const maxPop=Math.max(...rows.map(r=>r.popDiff),1);
  let html=`<table><thead><tr>
    <th class="check-col"><input type="checkbox" id="checkAll" onchange="toggleAll(this)"></th>
    <th onclick="reSort('name')">エリア名 ${sortIcon('name')}</th>
    <th onclick="reSort('region')">地域 ${sortIcon('region')}</th>
    <th onclick="reSort('type')">タイプ ${sortIcon('type')}</th>
    <th onclick="reSort('popDiff')">人口差（絶対値） ${sortIcon('popDiff')}</th>
    <th onclick="reSort('ageSim')">年齢構成 類似度 ${sortIcon('ageSim')}</th>
    <th onclick="reSort('indSim')">産業構成 類似度 ${sortIcon('indSim')}</th>
  </tr></thead><tbody>`;
  rows.forEach(r=>{
    const popPct=(r.popDiff/maxPop*100).toFixed(1);
    const ageColor=simColor(r.ageSim);
    const indColor=simColor(r.indSim);
    html+=`<tr>
      <td class="check-col"><input type="checkbox" value="${r.id}" onchange="onCheck(this)"></td>
      <td><strong>${r.name}</strong><br>
        <span style="color:var(--muted);font-size:.73rem;">${r.id}</span></td>
      <td><span class="tag tag-region">${r.region}</span></td>
      <td><span class="tag tag-type">${r.type}</span></td>
      <td class="bar-cell">
        <div class="bar-bg"><div class="bar-fill"
          style="width:${popPct}%;background:linear-gradient(90deg,#1a73e8,#4f8cff);"></div></div>
        <div class="bar-val">${Math.round(r.popDiff).toLocaleString()}人</div>
      </td>
      <td class="bar-cell">
        <div class="bar-bg"><div class="bar-fill"
          style="width:${(r.ageSim*100).toFixed(1)}%;background:${ageColor};"></div></div>
        <div class="bar-val">${(r.ageSim*100).toFixed(1)}%</div>
      </td>
      <td class="bar-cell">
        <div class="bar-bg"><div class="bar-fill"
          style="width:${(r.indSim*100).toFixed(1)}%;background:${indColor};"></div></div>
        <div class="bar-val">${(r.indSim*100).toFixed(1)}%</div>
      </td>
    </tr>`;
  });
  html+=`</tbody></table>`;
  document.getElementById('resultArea').innerHTML=html;
  document.getElementById('statusBar').style.display='flex';
  window._rows=rows; window._tPop=tPop;
}

function simColor(v){
  if(v>=0.98)return'#43a047';if(v>=0.95)return'#00b8a9';
  if(v>=0.9)return'#1a73e8';return'#90a4ae';
}
function sortIcon(col){
  if(sortCol!==col)return'<span class="sort-arrow">⇅</span>';
  return sortAsc?'<span class="sort-arrow">▲</span>':'<span class="sort-arrow">▼</span>';
}
function reSort(col){
  if(sortCol===col)sortAsc=!sortAsc;
  else{sortCol=col;sortAsc=col==='popDiff';}
  runAnalysis();
}
function toggleAll(el){
  document.querySelectorAll('#resultArea input[type=checkbox]').forEach(cb=>{
    cb.checked=el.checked;
    if(el.checked)selectedIds.add(cb.value);else selectedIds.delete(cb.value);
  });
  updateStatus();
}
function onCheck(el){
  if(el.checked)selectedIds.add(el.value);else selectedIds.delete(el.value);
  updateStatus();
}
function updateStatus(){
  const c=selectedIds.size;
  document.getElementById('selectedCount').textContent=c;
  const names=[...selectedIds].map(id=>areaMap[id]||id).join(', ');
  document.getElementById('selectedNames').textContent=names;
  document.getElementById('btnNext').disabled=c===0;
}

// ===== PAGE NAVIGATION =====
function goToPage2(){
  document.getElementById('page1').classList.remove('active');
  document.getElementById('page2').classList.add('active');
  buildDashboard();
}
function goToPage1(){
  document.getElementById('page2').classList.remove('active');
  document.getElementById('page1').classList.add('active');
  if(map){map.invalidateSize();}
}

// ===== PAGE 2 DASHBOARD =====
function buildDashboard(){
  const ids=[targetId,...selectedIds];
  let chipHtml='';
  ids.forEach((id,i)=>{
    const c=COLORS[i%COLORS.length];
    const label=id===targetId?'⭐ '+areaMap[id]+' (対象)':areaMap[id];
    chipHtml+=`<div class="area-chip" style="border-color:${c}22;">
      <span class="color-dot" style="background:${c};color:${c};"></span>
      <span>${label}</span>
      <span style="color:var(--muted);font-size:.72rem;margin-left:auto;">${id}</span>
    </div>`;
  });
  document.getElementById('areaChips').innerHTML=chipHtml;

  const allCodes=[...new Set(
    martData.filter(r=>ids.includes(r.area_id)).map(r=>r.index_code)
  )].sort();
  let filterHtml='<div style="max-height:400px;overflow-y:auto;">';
  allCodes.forEach(code=>{
    filterHtml+=`<label><input type="checkbox" class="idx-filter" value="${code}" checked
      onchange="updateCharts()"> ${indexMap[code]||code}</label>`;
  });
  filterHtml+='</div>';
  filterHtml+='<div style="margin-top:12px;display:flex;gap:8px;">'+
    '<button class="btn btn-secondary" style="font-size:.73rem;padding:6px 14px;" onclick="toggleFilters(true)">全選択</button>'+
    '<button class="btn btn-secondary" style="font-size:.73rem;padding:6px 14px;" onclick="toggleFilters(false)">全解除</button></div>';
  document.getElementById('indexFilters').innerHTML=filterHtml;

  setTimeout(()=>{initMap(ids);},100);
  setTimeout(()=>{updateCharts();},200);
}

function toggleFilters(val){
  document.querySelectorAll('.idx-filter').forEach(cb=>{cb.checked=val;});
  updateCharts();
}

function initMap(ids){
  if(map){map.remove();map=null;}
  map=L.map('mapContainer',{zoomControl:true,attributionControl:true}).setView([36.5,139.5],5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OpenStreetMap',maxZoom:18
  }).addTo(map);
  const bounds=[];
  ids.forEach((id,i)=>{
    const info=areaInfo[id];if(!info||!info.lat)return;
    const c=COLORS[i%COLORS.length];
    const isTarget=id===targetId;
    const marker=L.circleMarker([info.lat,info.lng],{
      radius:isTarget?11:8,fillColor:c,color:'#fff',weight:isTarget?3:2,
      fillOpacity:.85
    }).addTo(map);
    marker.bindPopup(`<div class="custom-popup"><strong>${areaMap[id]}</strong><br>
      ${info.pref} / ${info.region}<br>タイプ: ${info.type}</div>`);
    L.marker([info.lat,info.lng],{icon:L.divIcon({
      className:'area-label',html:areaMap[id],iconSize:[80,20],iconAnchor:[40,-10]
    })}).addTo(map);
    bounds.push([info.lat,info.lng]);
  });
  if(bounds.length>0)map.fitBounds(bounds,{padding:[40,40],maxZoom:8});
}

function updateCharts(){
  const ids=[targetId,...selectedIds];
  const checkedCodes=new Set(
    [...document.querySelectorAll('.idx-filter:checked')].map(cb=>cb.value)
  );
  const filteredCodes=[...checkedCodes].sort();

  const datasets={};
  ids.forEach(id=>{
    datasets[id]={};
    martData.filter(r=>r.area_id===id&&checkedCodes.has(r.index_code))
      .forEach(r=>{datasets[id][r.index_code]=r.normalized_score;});
  });

  let displayCodes=filteredCodes;
  if(filteredCodes.length>30){displayCodes=filteredCodes.slice(0,30);}
  const labels=displayCodes.map(c=>indexMap[c]||c);
  const shortLabels=labels.map(l=>l.length>12?l.slice(0,12)+'…':l);

  // ---- Radar Chart ----
  if(radarChart){radarChart.destroy();}
  const radarCodes=displayCodes.length>20?displayCodes.slice(0,20):displayCodes;
  const radarLabels=radarCodes.map(c=>{const n=indexMap[c]||c;return n.length>10?n.slice(0,10)+'…':n;});
  const radarDS=ids.map((id,i)=>({
    label:areaMap[id],data:radarCodes.map(c=>datasets[id][c]||0),
    borderColor:COLORS[i%COLORS.length],
    backgroundColor:COLORS[i%COLORS.length]+'22',
    pointRadius:2,borderWidth:2
  }));
  radarChart=new Chart(document.getElementById('radarChart'),{
    type:'radar',data:{labels:radarLabels,datasets:radarDS},
    options:{responsive:true,
      plugins:{legend:{labels:{color:'#4a5568',font:{size:11,family:"'Noto Sans JP',sans-serif"}}}},
      scales:{r:{grid:{color:'#e2e8f0'},ticks:{display:false,stepSize:20},
        pointLabels:{color:'#4a5568',font:{size:9,family:"'Noto Sans JP',sans-serif"}},
        min:0,max:100}}}
  });

  // ---- Bar Chart ----
  if(barChart){barChart.destroy();}
  const barDS=ids.map((id,i)=>({
    label:areaMap[id],data:displayCodes.map(c=>datasets[id][c]||0),
    backgroundColor:COLORS[i%COLORS.length]+'bb',borderRadius:4,barPercentage:.7
  }));
  barChart=new Chart(document.getElementById('barChart'),{
    type:'bar',data:{labels:shortLabels,datasets:barDS},
    options:{responsive:true,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#4a5568',font:{size:11,family:"'Noto Sans JP',sans-serif"}}}},
      scales:{x:{ticks:{color:'#718096',font:{size:8},maxRotation:60},grid:{color:'#f0f0f0'}},
        y:{ticks:{color:'#718096'},grid:{color:'#f0f0f0'},min:0,max:100}}}
  });

  // ---- Diff Chart ----
  if(diffChart){diffChart.destroy();}
  const compIds=[...selectedIds];
  const diffDS=compIds.map((id,i)=>({
    label:areaMap[id],data:displayCodes.map(c=>{
      const tv=datasets[targetId]?.[c]||0;const cv=datasets[id]?.[c]||0;return cv-tv;
    }),
    backgroundColor:displayCodes.map(c=>{
      const tv=datasets[targetId]?.[c]||0;const cv=datasets[id]?.[c]||0;
      return cv>=tv?'rgba(67,160,71,.55)':'rgba(229,57,53,.55)';
    }),borderRadius:3
  }));
  diffChart=new Chart(document.getElementById('diffChart'),{
    type:'bar',data:{labels:shortLabels,datasets:diffDS},
    options:{responsive:true,indexAxis:'x',
      plugins:{legend:{labels:{color:'#4a5568',font:{size:11,family:"'Noto Sans JP',sans-serif"}}},
        tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+(ctx.raw>0?'+':'')+ctx.raw.toFixed(1)}}},
      scales:{x:{ticks:{color:'#718096',font:{size:8},maxRotation:60},grid:{color:'#f0f0f0'}},
        y:{ticks:{color:'#718096'},grid:{color:'#f0f0f0'}}}}
  });
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
